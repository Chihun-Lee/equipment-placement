function makeLabelSprite(text) {
  const dpr = Math.min(window.devicePixelRatio || 1, 3);
  const c = document.createElement('canvas');
  const pad = 12, fs = 40;
  const font = `bold ${fs}px -apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif`;
  const mctx = c.getContext('2d'); mctx.font = font;
  const logW = mctx.measureText(text).width + pad * 2, logH = fs + pad * 2;
  c.width = logW * dpr; c.height = logH * dpr;
  const ctx = c.getContext('2d'); ctx.scale(dpr, dpr); ctx.font = font;
  ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.beginPath(); ctx.roundRect(0, 0, logW, logH, 4); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.textBaseline = 'middle'; ctx.fillText(text, pad, logH / 2);
  const tex = new THREE.CanvasTexture(c); tex.minFilter = THREE.LinearFilter; tex.magFilter = THREE.LinearFilter;
  const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, depthTest: false, transparent: true }));
  s.scale.set(logW * 0.004, logH * 0.004, 1);
  return s;
}
function c2i(c) { return typeof c === 'number' ? c : parseInt(String(c).replace('#',''), 16); }
function i2h(i) { return '#' + Math.max(0, i).toString(16).padStart(6, '0'); }

// ─── 이미지 처리 (배경제거 + 필터) ───
function processImage(img, tolerance = 38) {
  const MAX = 512;
  const scale = Math.min(1, MAX / Math.max(img.width, img.height));
  const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  const ctx = c.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
  const id = ctx.getImageData(0, 0, w, h);
  const d = id.data;

  // 1. 코너 색 평균 → 배경색
  const gc = (x, y) => { const i = (y * w + x) * 4; return [d[i], d[i+1], d[i+2]]; };
  const corners = [gc(0,0), gc(w-1,0), gc(0,h-1), gc(w-1,h-1)];
  const bg = corners.reduce((a,b) => [a[0]+b[0], a[1]+b[1], a[2]+b[2]], [0,0,0]).map(v => v / 4);
  const dist = (a, b) => Math.sqrt((a[0]-b[0])**2 + (a[1]-b[1])**2 + (a[2]-b[2])**2);

  // 2. BFS 가장자리에서 배경 제거
  const visited = new Uint8Array(w * h);
  const queue = [];
  for (let x = 0; x < w; x++) { queue.push(x, (h-1)*w+x); visited[x] = 1; visited[(h-1)*w+x] = 1; }
  for (let y = 1; y < h - 1; y++) { queue.push(y*w, y*w+w-1); visited[y*w] = 1; visited[y*w+w-1] = 1; }
  let qi = 0;
  while (qi < queue.length) {
    const idx = queue[qi++];
    const px = idx % w, py = (idx - px) / w;
    const i = idx * 4;
    if (dist([d[i], d[i+1], d[i+2]], bg) < tolerance) {
      d[i+3] = 0;
      for (const [dx, dy] of [[-1,0],[1,0],[0,-1],[0,1]]) {
        const nx = px+dx, ny = py+dy;
        if (nx >= 0 && nx < w && ny >= 0 && ny < h) { const ni = ny*w+nx; if (!visited[ni]) { visited[ni] = 1; queue.push(ni); } }
      }
    }
  }

  // 3. 가장자리 페더링
  const alpha = new Uint8Array(w * h);
  for (let i = 0; i < w * h; i++) alpha[i] = d[i * 4 + 3];
  for (let y = 1; y < h - 1; y++) for (let x = 1; x < w - 1; x++) {
    const i = y * w + x;
    if (alpha[i] > 0) {
      let hasTrans = false;
      for (const [dx, dy] of [[-1,0],[1,0],[0,-1],[0,1]]) if (alpha[(y+dy)*w+(x+dx)] === 0) { hasTrans = true; break; }
      if (hasTrans) d[i * 4 + 3] = Math.round(alpha[i] * 0.6);
    }
  }

  // 4. 아트 필터 (포스터라이즈 + 채도 부스트)
  const levels = 10, step = 256 / levels;
  for (let i = 0; i < d.length; i += 4) {
    if (d[i+3] === 0) continue;
    const avg = (d[i] + d[i+1] + d[i+2]) / 3;
    for (let c = 0; c < 3; c++) {
      let v = avg + (d[i+c] - avg) * 1.15; // 채도
      v = Math.round(v / step) * step; // 포스터라이즈
      d[i+c] = Math.max(0, Math.min(255, v));
    }
  }

  ctx.putImageData(id, 0, 0);

  // 5. 실루엣 추출 (윤곽 기반 3D 돌출용)
  const silhouette = [];
  const stepY = Math.max(1, Math.floor(h / 48));
  for (let sy = 0; sy < h; sy += stepY) {
    let left = -1, right = -1;
    for (let sx = 0; sx < w; sx++) {
      if (d[(sy * w + sx) * 4 + 3] > 40) { if (left === -1) left = sx; right = sx; }
    }
    if (left >= 0) silhouette.push([sy / (h - 1), left / w, (right + 1) / w]);
  }

  return { dataURL: c.toDataURL('image/png'), silhouette: silhouette.length >= 3 ? silhouette : null };
}

// ─── 방 빌드 (다중 공간) ───
const roomGroup = new THREE.Group(); scene.add(roomGroup);
const dimGroup = new THREE.Group(); scene.add(dimGroup);
let floorMeshes = [];

function buildAllRooms() {
  roomGroup.traverse(ch => { if (ch.isMesh) { ch.geometry.dispose(); if (ch.material.dispose) ch.material.dispose(); }});
  roomGroup.clear();
  floorMeshes = [];
  spaces.forEach(sp => {
    const { x, z, w, d, h, floorColor, wallColor } = sp;
    // 바닥
    const fm = new THREE.Mesh(new THREE.PlaneGeometry(w, d), new THREE.MeshStandardMaterial({ color: floorColor, side: THREE.DoubleSide }));
    fm.rotation.x = -Math.PI / 2; fm.position.set(x + w/2, 0, z + d/2);
    fm.userData.isFloor = true; fm.userData.spaceId = sp.id;
    roomGroup.add(fm); floorMeshes.push(fm);
    // 그리드
    const gr = new THREE.GridHelper(Math.max(w, d) * 2, Math.max(w, d) * 2, 0x555555, 0x666666);
    gr.position.set(x + w/2, 0.002, z + d/2); gr.material.opacity = 0.3; gr.material.transparent = true;
    roomGroup.add(gr);
    // 벽
    const wm = (ww, hh, px, py, pz, ry) => {
      const m = new THREE.Mesh(new THREE.PlaneGeometry(ww, hh), new THREE.MeshStandardMaterial({ color: wallColor, transparent: true, opacity: 0.45, side: THREE.DoubleSide }));
      m.position.set(px, py, pz); m.rotation.y = ry; roomGroup.add(m);
    };
    wm(w, h, x+w/2, h/2, z, 0);
    wm(w, h, x+w/2, h/2, z+d, Math.PI);
    wm(d, h, x, h/2, z+d/2, Math.PI/2);
    wm(d, h, x+w, h/2, z+d/2, -Math.PI/2);
  });
  updateDims();
}

function updateDims() {
  dimGroup.traverse(ch => { if (ch.material) { if (ch.material.map) ch.material.map.dispose(); ch.material.dispose(); } if (ch.geometry) ch.geometry.dispose(); });
  dimGroup.clear();
  if (!showDims) return;
  spaces.forEach(sp => {
    const { x, z, w, d, h } = sp;
    // W
    const wl = makeLabelSprite(`${w.toFixed(1)}m`);
    wl.position.set(x + w/2, 0.05, z - 0.4); dimGroup.add(wl);
    const wLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x, 0.05, z - 0.25), new THREE.Vector3(x+w, 0.05, z - 0.25)]), new THREE.LineBasicMaterial({ color: 0xffffff }));
    dimGroup.add(wLine);
    // D
    const dl = makeLabelSprite(`${d.toFixed(1)}m`);
    dl.position.set(x - 0.4, 0.05, z + d/2); dimGroup.add(dl);
    const dLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x - 0.25, 0.05, z), new THREE.Vector3(x - 0.25, 0.05, z+d)]), new THREE.LineBasicMaterial({ color: 0xffffff }));
    dimGroup.add(dLine);
    // H
    const hl = makeLabelSprite(`${h.toFixed(1)}m`);
    hl.position.set(x - 0.4, h/2, z); dimGroup.add(hl);
    const hLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x - 0.25, 0, z), new THREE.Vector3(x - 0.25, h, z)]), new THREE.LineBasicMaterial({ color: 0xffffff }));
    dimGroup.add(hLine);
  });
}
buildAllRooms();

// ─── 프리미티브 빌더 (장비별 3D 형태) ───
// 헬퍼: mesh 생성 후 position 설정
function pm(geo, mat, x, y, z, rx, ry, rz) {
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x || 0, y || 0, z || 0);
  if (rx || ry || rz) m.rotation.set(rx || 0, ry || 0, rz || 0);
  return m;
}

  '경도기': (w, d, h, color) => {
    const g = new THREE.Group();
    g.add(pm(new THREE.BoxGeometry(w*0.8, h*0.15, d*0.8), new THREE.MeshStandardMaterial({ color }), 0, h*0.075, 0));
    g.add(pm(new THREE.CylinderGeometry(w*0.08, w*0.1, h*0.55, 8), new THREE.MeshStandardMaterial({ color: 0x555555 }), -w*0.1, h*0.43, 0));
    g.add(pm(new THREE.CylinderGeometry(w*0.03, w*0.03, h*0.2, 8), new THREE.MeshStandardMaterial({ color: 0x444444 }), 0, h*0.35, 0));
    g.add(pm(new THREE.BoxGeometry(w*0.3, h*0.25, 0.03), new THREE.MeshStandardMaterial({ color: 0x222233, emissive: 0x112244, emissiveIntensity: 0.3 }), w*0.15, h*0.55, d*0.2));
    return g;
  },
};

function matchPrimitive(name) {
  if (/SEM/i.test(name)) return 'SEM';
  if (/3D.*프린터|PBF|SLA/i.test(name)) return '3D프린터';
  if (/전기로|열처리/i.test(name)) return '전기로';
  if (/현미경/i.test(name)) return '현미경';
  if (/후드/i.test(name)) return '후드';
  if (/테이블|벤치|책상/i.test(name)) return '테이블';
  if (/캐비닛/i.test(name)) return '캐비닛';
  if (/냉장고/i.test(name)) return '냉장고';
  if (/글로브|드라이/i.test(name)) return '글로브박스';
  if (/인장/i.test(name)) return '인장시험기';
  if (/XRD/i.test(name)) return 'XRD';
  if (/EDM|와이어.*가공/i.test(name)) return 'EDM';
  if (/PC|데스크탑/i.test(name)) return 'PC';
  if (/모니터/i.test(name) && !/PC/i.test(name)) return '모니터';
  if (/가스.*보관|안전.*보관|공구.*보관|시편.*보관/i.test(name)) return '보관함';
  if (/레이저.*커팅|레이저.*각인/i.test(name)) return '레이저장비';
  if (/스캐너/i.test(name)) return '스캐너';
  if (/압연/i.test(name)) return '압연기';
  if (/의자/i.test(name)) return '의자';
  if (/경도/i.test(name)) return '경도기';
  return null;
}

// ─── GLB 모델 로더 ───
const gltfLoader = new GLTFLoader();

function loadGLBFromFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const url = URL.createObjectURL(new Blob([e.target.result]));
      gltfLoader.load(url, gltf => { URL.revokeObjectURL(url); resolve(gltf.scene); }, undefined, reject);
    };
    reader.readAsArrayBuffer(file);
  });
}

function loadGLBFromDataURL(dataURL) {
  return new Promise((resolve, reject) => {
    const bin = atob(dataURL.split(',')[1]);
    const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    const url = URL.createObjectURL(new Blob([arr], { type: 'model/gltf-binary' }));
    gltfLoader.load(url, gltf => { URL.revokeObjectURL(url); resolve(gltf.scene); }, undefined, reject);
  });
}

// ─── 텍스처에서 재질 생성 (사진 → alphaTest 박스) ───
function makeTexMaterials(dataURL, color, opacity) {
  const tex = new THREE.TextureLoader().load(dataURL);
  tex.minFilter = THREE.LinearFilter; tex.magFilter = THREE.LinearFilter;
  const faceMat = new THREE.MeshStandardMaterial({ map: tex, transparent: true, alphaTest: 0.3 });
  const sideMat = new THREE.MeshStandardMaterial({ color, transparent: true, opacity: 0.35 });
  const topMat = new THREE.MeshStandardMaterial({ visible: false });
  return [sideMat, sideMat, topMat, topMat, faceMat, faceMat];
}

function addEquipment(spec, x = null, z = null) {
  const sp = activeSpace();
  const id = nextId++;
  const p = { w: spec.w, d: spec.d, h: spec.h, color: c2i(spec.color), opacity: spec.opacity ?? 1, showLabel: spec.showLabel ?? true };
  // 3D 표현 우선순위: GLB → 프리미티브 → 사진텍스처 → 박스
  let mesh, usePrimitive = false;
  const primKey = matchPrimitive(spec.name);
  if (spec.glbDataURL) {
    // GLB는 비동기 로드 — 일단 박스 placeholder 후 교체
    mesh = new THREE.Mesh(new THREE.BoxGeometry(p.w, p.h, p.d), new THREE.MeshStandardMaterial({ color: p.color, transparent: true, opacity: 0.3 }));
    loadGLBFromDataURL(spec.glbDataURL).then(model => {
      const box = new THREE.Box3().setFromObject(model);
      const sz = new THREE.Vector3(); box.getSize(sz);
      const sc = Math.min(p.w / sz.x, p.h / sz.y, p.d / sz.z) * 0.9;
      model.scale.setScalar(sc);
      const ctr = new THREE.Vector3(); box.getCenter(ctr);
      model.position.sub(ctr.multiplyScalar(sc));
      mesh.add(model);
    }).catch(() => {});
  } else if (primKey && PRIMITIVES[primKey] && !spec.textureDataURL) {
    mesh = PRIMITIVES[primKey](p.w, p.d, p.h, p.color);
    // 피킹용 투명 박스
    const pickBox = new THREE.Mesh(new THREE.BoxGeometry(p.w, p.h, p.d), new THREE.MeshBasicMaterial({ visible: false }));
    pickBox.position.y = p.h / 2;
    pickBox.userData.id = id;
    mesh.add(pickBox);
    usePrimitive = true;
  } else if (spec.textureDataURL) {
    const geo = new THREE.BoxGeometry(p.w, p.h, p.d);
    mesh = new THREE.Mesh(geo, makeTexMaterials(spec.textureDataURL, p.color, p.opacity));
  } else {
    const geo = new THREE.BoxGeometry(p.w, p.h, p.d);
    mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: p.color, transparent: p.opacity < 1, opacity: p.opacity }));
  }
  if (mesh.geometry) {
    const edges = new THREE.LineSegments(new THREE.EdgesGeometry(mesh.geometry), new THREE.LineBasicMaterial({ color: 0x000000 }));
    mesh.add(edges);
  }
  const label = makeLabelSprite(spec.name);
  label.position.set(0, usePrimitive ? (p.h + 0.25) : (p.h/2 + 0.25), 0);
  label.visible = p.showLabel;
  mesh.add(label);
  if (x === null) x = sp.x + sp.w / 2;
  if (z === null) z = sp.z + sp.d / 2;
  mesh.position.set(x, usePrimitive ? 0 : p.h / 2, z);
  mesh.userData.id = id;
  scene.add(mesh);
  const edges = mesh.geometry ? new THREE.LineSegments(new THREE.EdgesGeometry(mesh.geometry), new THREE.LineBasicMaterial({ color: 0x000000 })) : null;
  if (edges) mesh.add(edges);
  const item = { id, type: 'equipment', name: spec.name, spaceId: sp.id, spec: { ...spec }, mesh, label, edges, rotY: 0, props: p, textureDataURL: spec.textureDataURL || null, glbDataURL: spec.glbDataURL || null, usePrimitive };
  placed.push(item); refreshPlacedList(); selectItem(id); pushHistory(`+ ${spec.name} 배치`);
  return item;
}

function updateEquipVisual(item) {
  const p = item.props;
  if (item.usePrimitive) {
    // 프리미티브는 재빌드 필요 — 색상만 업데이트
    item.mesh.traverse(ch => { if (ch.isMesh && ch.material && ch.material.color) ch.material.color.setHex(p.color); });
    item.label.position.y = p.h + 0.25; item.label.visible = p.showLabel;
    return;
  }
  if (!item.mesh.geometry) { item.label.visible = p.showLabel; return; }
  item.mesh.geometry.dispose();
  item.mesh.geometry = new THREE.BoxGeometry(p.w, p.h, p.d);
  if (item.edges) item.mesh.remove(item.edges);
  item.edges = new THREE.LineSegments(new THREE.EdgesGeometry(item.mesh.geometry), new THREE.LineBasicMaterial({ color: 0x000000 }));
  item.mesh.add(item.edges);
  if (Array.isArray(item.mesh.material)) item.mesh.material.forEach(m => m.dispose());
  else if (item.mesh.material?.dispose) item.mesh.material.dispose();
  if (item.textureDataURL) {
    item.mesh.material = makeTexMaterials(item.textureDataURL, p.color, p.opacity);
  } else {
    item.mesh.material = new THREE.MeshStandardMaterial({ color: p.color, transparent: p.opacity < 1, opacity: p.opacity });
  }
  const baseY = item.usePrimitive ? 0 : p.h / 2;
  if (item.mesh.position.y < baseY) item.mesh.position.y = baseY;
  item.label.position.y = item.usePrimitive ? (p.h + 0.25) : (p.h / 2 + 0.25);
  item.label.visible = p.showLabel;
}

// ─── 문 ───
function getWV(wall) { return { south:{r:[1,0],i:[0,1]}, north:{r:[-1,0],i:[0,-1]}, west:{r:[0,-1],i:[1,0]}, east:{r:[0,1],i:[-1,0]} }[wall]; }
function getDC(sp, wall, pos) { return { south:[sp.x+pos,sp.z], north:[sp.x+pos,sp.z+sp.d], west:[sp.x,sp.z+pos], east:[sp.x+sp.w,sp.z+pos] }[wall]; }

function buildArcMesh(p, sp) {
  const v = getWV(p.wall); const ctr = getDC(sp, p.wall, p.pos);
  const hw = p.width / 2, hs = p.hinge === 'left' ? -1 : 1;
  const hx = ctr[0] + hs * hw * v.r[0], hz = ctr[1] + hs * hw * v.r[1];
  const cd = p.hinge === 'left' ? v.r : [-v.r[0], -v.r[1]];
  const ss = p.swing === 'in' ? 1 : -1;
  const od = [ss * v.i[0], ss * v.i[1]];
  const sa = Math.atan2(cd[1], cd[0]), ea = Math.atan2(od[1], od[0]);
  let df = ea - sa; if (df > Math.PI) df -= 2 * Math.PI; if (df < -Math.PI) df += 2 * Math.PI;
  const pts = [new THREE.Vector3(hx, 0.015, hz)];
  for (let i = 0; i <= 20; i++) { const a = sa + df * (i/20); pts.push(new THREE.Vector3(hx + p.width * Math.cos(a), 0.015, hz + p.width * Math.sin(a))); }
  pts.push(new THREE.Vector3(hx, 0.015, hz));
  // fill
  const fp = []; for (let i = 0; i <= 20; i++) { const a = sa + df*(i/20); fp.push(new THREE.Vector2(p.width*Math.cos(a), p.width*Math.sin(a))); }
  fp.push(new THREE.Vector2(0, 0));
  const fg = new THREE.ShapeGeometry(new THREE.Shape(fp));
  const fm = new THREE.Mesh(fg, new THREE.MeshBasicMaterial({ color: 0xffcc00, transparent: true, opacity: 0.12, side: THREE.DoubleSide }));
  fm.rotation.x = -Math.PI / 2; fm.position.set(hx, 0.01, hz);
  const g = new THREE.Group();
  g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), new THREE.LineBasicMaterial({ color: 0xffcc00 })));
  g.add(fm);
  return g;
}

function addDoor() {
  const sp = activeSpace(); const id = nextId++;
  const p = { width: 0.9, height: 2.1, color: 0xcc8844, wall: 'south', pos: sp.w / 2, hinge: 'left', swing: 'in', showLabel: true };
  const panel = new THREE.Mesh(new THREE.BoxGeometry(p.width, p.height, 0.06), new THREE.MeshStandardMaterial({ color: p.color }));
  panel.userData.id = id; scene.add(panel);
  const arc = buildArcMesh(p, sp); scene.add(arc);
  const label = makeLabelSprite('문'); label.visible = p.showLabel; panel.add(label);
  const item = { id, type: 'door', name: '문', spaceId: sp.id, mesh: panel, arc, label, props: p };
  placed.push(item); updateDoorPlace(item); refreshPlacedList(); selectItem(id); pushHistory('+ 문 배치');
  return item;
}

function updateDoorPlace(item) {
  const sp = spaces.find(s => s.id === item.spaceId) || activeSpace();
  const p = item.props, hw = p.width / 2;
  if (p.wall === 'south' || p.wall === 'north') p.pos = Math.max(hw, Math.min(sp.w - hw, p.pos));
  else p.pos = Math.max(hw, Math.min(sp.d - hw, p.pos));
  item.mesh.geometry.dispose(); item.mesh.geometry = new THREE.BoxGeometry(p.width, p.height, 0.06);
  item.mesh.material.color.setHex(p.color);
  const ctr = getDC(sp, p.wall, p.pos); const off = 0.04;
  let px, pz, ry;
  switch (p.wall) { case 'south': px=ctr[0]; pz=sp.z+off; ry=0; break; case 'north': px=ctr[0]; pz=sp.z+sp.d-off; ry=Math.PI; break; case 'west': px=sp.x+off; pz=ctr[1]; ry=-Math.PI/2; break; case 'east': px=sp.x+sp.w-off; pz=ctr[1]; ry=Math.PI/2; break; }
  item.mesh.position.set(px, p.height / 2, pz); item.mesh.rotation.y = ry;
  item.label.position.set(0, p.height / 2 + 0.2, 0);
  scene.remove(item.arc); item.arc = buildArcMesh(p, sp); scene.add(item.arc);
}

function snapDoor(item, hx, hz) {
  const sp = spaces.find(s => s.id === item.spaceId) || activeSpace();
  const cands = [
    { wall: 'south', dist: Math.abs(hz - sp.z), pos: hx - sp.x },
    { wall: 'north', dist: Math.abs(hz - (sp.z + sp.d)), pos: hx - sp.x },
    { wall: 'west', dist: Math.abs(hx - sp.x), pos: hz - sp.z },
    { wall: 'east', dist: Math.abs(hx - (sp.x + sp.w)), pos: hz - sp.z },
  ];
  cands.sort((a, b) => a.dist - b.dist);
  item.props.wall = cands[0].wall; item.props.pos = cands[0].pos;
  updateDoorPlace(item);
}

function buildRobotMeshes(g, p) {
  // 기존 자식 제거 (라벨 제외)
  const toRemove = g.children.filter(c => c !== g.children.find(cc => cc.isSprite));
  toRemove.forEach(c => { g.remove(c); if (c.geometry) c.geometry.dispose(); if (c.material) { if (c.material.dispose) c.material.dispose(); } });

  const pick = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.5, 0.6), new THREE.MeshBasicMaterial({ visible: false }));
  pick.position.y = 0.75; pick.userData.id = g.userData.id; pick.userData.isPick = true; g.add(pick);
  // 베이스
  const base = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.26, 0.12, 16), new THREE.MeshStandardMaterial({ color: 0x333333 }));
  base.position.y = 0.06; g.add(base);
  // 하부암
  const lo = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.6, 0.1), new THREE.MeshStandardMaterial({ color: p.color }));
  lo.position.set(0, 0.42, 0); g.add(lo);
  // 관절
  const j1 = new THREE.Mesh(new THREE.SphereGeometry(0.07, 8, 8), new THREE.MeshStandardMaterial({ color: 0x666666 }));
  j1.position.set(0, 0.72, 0); g.add(j1);
  // 상부암 (기울어짐)
  const up = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.5, 0.08), new THREE.MeshStandardMaterial({ color: p.color }));
  up.position.set(0.18, 0.92, 0); up.rotation.z = -Math.PI / 5; g.add(up);
  // 관절2
  const j2 = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), new THREE.MeshStandardMaterial({ color: 0x666666 }));
  j2.position.set(0.36, 1.08, 0); g.add(j2);
  // 엔드이펙터
  const ee = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.05, 0.14), new THREE.MeshStandardMaterial({ color: 0x888888 }));
  ee.position.set(0.36, 1.14, 0); g.add(ee);
  // 리치 원 (바닥)
  const rc = new THREE.Mesh(new THREE.CircleGeometry(p.reach, 48), new THREE.MeshBasicMaterial({ color: p.color, transparent: true, opacity: 0.1, side: THREE.DoubleSide }));
  rc.rotation.x = -Math.PI / 2; rc.position.y = 0.008; g.add(rc);
  // 리치 원 테두리
  const rpts = Array.from({ length: 65 }, (_, i) => { const a = (i/64) * Math.PI * 2; return new THREE.Vector3(p.reach * Math.cos(a), 0.012, p.reach * Math.sin(a)); });
  const rl = new THREE.Line(new THREE.BufferGeometry().setFromPoints(rpts), new THREE.LineBasicMaterial({ color: p.color, transparent: true, opacity: 0.5 }));
  g.add(rl);
}

function removeItem(id) {
  const idx = placed.findIndex(p => p.id === id); if (idx < 0) return;
  const it = placed[idx]; scene.remove(it.mesh); if (it.arc) scene.remove(it.arc);
  placed.splice(idx, 1);
  if (selectedId === id) selectedId = null;
  refreshPlacedList(); refreshEditPanel(); pushHistory(`- ${it.name} 삭제`);
}

function selectItem(id) {
  selectedId = id; editingLibIdx = null;
  placed.forEach(p => {
    let mat;
    if (p.type === 'person') mat = p.torso?.material;
    else if (p.type === 'robot') { const arm = p.mesh.children.find(c => c.isMesh && c.material?.color && !c.userData.isPick && c.geometry?.parameters?.height === 0.6); mat = arm?.material; }
    else mat = Array.isArray(p.mesh.material) ? p.mesh.material[0] : p.mesh.material;
    if (mat?.emissive) { mat.emissive.setHex(p.id === id ? 0x4ec9b0 : 0); mat.emissiveIntensity = p.id === id ? 0.4 : 0; }
  });
  refreshPlacedList(); refreshEditPanel();
}

    const row = document.createElement('div'); row.className = 'lib-row';
    const cat = spec.category === 'tabletop' ? '📐' : (spec.surface ? '🔲' : '');
    const img = spec.textureDataURL ? `<img src="${spec.textureDataURL}" style="width:20px;height:20px;border-radius:2px;object-fit:cover;">` : '';
    row.innerHTML = `<div class="name">${img}${spec.name} ${cat}<small>${spec.w}×${spec.d}×${spec.h}m</small></div><button class="sm">+</button>`;
    row.querySelector('.name').onclick = () => { editingLibIdx = editingLibIdx === idx ? null : idx; renderLibrary(); };
    row.querySelector('button').onclick = e => { e.stopPropagation(); addEquipment(spec); };
    el.appendChild(row);
    if (editingLibIdx === idx) {
      const ed = document.createElement('div'); ed.className = 'lib-edit';
      ed.innerHTML = `
        <label>이름</label><input type="text" data-k="name" value="${spec.name}">
        <div class="row"><div><label>W</label><input type="number" step="0.05" data-k="w" value="${spec.w}"></div>
        <div><label>D</label><input type="number" step="0.05" data-k="d" value="${spec.d}"></div>
        <div><label>H</label><input type="number" step="0.05" data-k="h" value="${spec.h}"></div></div>
        <label>색상</label><input type="color" data-k="color" id="lc${idx}" value="${spec.color}">
        ${paletteHTML('lc'+idx)}
        <label>투명도 ${(spec.opacity??1).toFixed(2)}</label>
        <input type="range" min="0" max="1" step="0.05" data-k="opacity" value="${spec.opacity??1}">
        <div class="chk"><input type="checkbox" data-k="showLabel" ${spec.showLabel!==false?'checked':''}> 라벨</div>
        <label>카테고리</label><select data-k="category"><option value="floor" ${spec.category==='floor'?'selected':''}>바닥</option><option value="tabletop" ${spec.category==='tabletop'?'selected':''}>테이블탑</option></select>
        <div class="chk"><input type="checkbox" data-k="surface" ${spec.surface?'checked':''}> 작업면</div>
        <label>3D 모델 / 사진</label>
        <div class="section-btns">
          <button class="sm ghost" id="glbBtn${idx}">🧊 GLB 업로드</button>
          <button class="sm ghost" id="imgBtn${idx}">📷 사진 업로드</button>
        </div>
        <input type="file" id="glbFile${idx}" accept=".glb,.gltf">
        <input type="file" id="imgFile${idx}" accept="image/*">
        ${spec.textureDataURL ? `<img class="img-preview" src="${spec.textureDataURL}"><button class="sm danger" id="imgDel${idx}">사진 제거</button>` : ''}
        ${spec.glbDataURL ? `<div style="color:#4ec9b0;font-size:10px;margin:3px 0">✓ GLB 모델 등록됨</div><button class="sm danger" id="glbDel${idx}">GLB 제거</button>` : ''}
        <div class="row" style="margin-top:6px"><button class="sm" data-act="place">+ 배치</button><button class="sm ghost" data-act="close">닫기</button></div>`;
      ed.querySelectorAll('[data-k]').forEach(el => {
        el.oninput = () => { const k = el.dataset.k; spec[k] = el.type==='checkbox'?el.checked:(el.type==='number'||el.type==='range')?parseFloat(el.value):el.value; };
      });
      ed.querySelector('[data-act="place"]').onclick = () => addEquipment(spec);
      ed.querySelector('[data-act="close"]').onclick = () => { editingLibIdx = null; renderLibrary(); };
      // 이미지 업로드
      const imgBtn = ed.querySelector(`#imgBtn${idx}`);
      const imgFile = ed.querySelector(`#imgFile${idx}`);
      imgBtn.onclick = () => imgFile.click();
      imgFile.onchange = e => {
        const f = e.target.files[0]; if (!f) return;
        const r = new FileReader(); r.onload = ev => {
          const img = new Image(); img.onload = () => {
            const result = processImage(img);
            spec.textureDataURL = result.dataURL;
            spec.silhouette = result.silhouette;
            renderLibrary();
          }; img.src = ev.target.result;
        }; r.readAsDataURL(f);
      };
      const imgDel = ed.querySelector(`#imgDel${idx}`);
      if (imgDel) imgDel.onclick = () => { delete spec.textureDataURL; renderLibrary(); };
      // GLB 업로드
      const glbBtn = ed.querySelector(`#glbBtn${idx}`);
      const glbFile = ed.querySelector(`#glbFile${idx}`);
      glbBtn.onclick = () => glbFile.click();
      glbFile.onchange = e => {
        const f = e.target.files[0]; if (!f) return;
        const r = new FileReader(); r.onload = ev => {
          spec.glbDataURL = 'data:model/gltf-binary;base64,' + btoa(String.fromCharCode(...new Uint8Array(ev.target.result)));
          renderLibrary();
        }; r.readAsArrayBuffer(f);
      };
      const glbDel = ed.querySelector(`#glbDel${idx}`);
      if (glbDel) glbDel.onclick = () => { delete spec.glbDataURL; renderLibrary(); };
      el.appendChild(ed);
    }
  });
}
renderLibrary();

function renderSpaceList() {
  const el = document.getElementById('spaceList'); el.innerHTML = '';
  spaces.forEach(sp => {
    const d = document.createElement('div');
    d.className = 'space-row' + (sp.id === activeSpaceId ? ' active' : '');
    d.innerHTML = `<span>${sp.name} (${sp.w}×${sp.d}m)</span><button class="sm danger" data-del="${sp.id}">✕</button>`;
    d.querySelector('span').onclick = () => { activeSpaceId = sp.id; syncSpaceUI(); renderSpaceList(); refreshPlacedList(); };
    d.querySelector('button').onclick = e => { e.stopPropagation(); if (spaces.length <= 1) return; spaces = spaces.filter(s => s.id !== sp.id); placed.filter(p => p.spaceId === sp.id).forEach(p => removeItem(p.id)); if (activeSpaceId === sp.id) activeSpaceId = spaces[0].id; buildAllRooms(); syncSpaceUI(); renderSpaceList(); refreshPlacedList(); pushHistory('- 공간 삭제'); };
    el.appendChild(d);
  });
}
renderSpaceList();

function syncSpaceUI() {
  const sp = activeSpace(); if (!sp) return;
  document.getElementById('roomW').value = sp.w;
  document.getElementById('roomD').value = sp.d;
  document.getElementById('roomH').value = sp.h;
  document.getElementById('floorColor').value = i2h(sp.floorColor);
  document.getElementById('wallColor').value = i2h(sp.wallColor);
  document.getElementById('spaceName').value = sp.name;
}
syncSpaceUI();

function refreshPlacedList() {
  const el = document.getElementById('placedList'); el.innerHTML = '';
  const items = placed.filter(p => p.spaceId === activeSpaceId);
  if (!items.length) { el.innerHTML = '<small style="color:#666">없음</small>'; return; }
  items.forEach(p => {
    const d = document.createElement('div');

  });

refreshPlacedList();

function refreshEditPanel() {
  const el = document.getElementById('editPanel');
  const item = placed.find(p => p.id === selectedId);
  if (!item) { el.innerHTML = '<small style="color:#666">객체를 선택하세요</small>'; return; }
  if (item.type === 'equipment') renderEquipEdit(el, item);
  else if (item.type === 'door') renderDoorEdit(el, item);
  else if (item.type === 'barrier') renderBarrierEdit(el, item);

}

// 인접 공간 추가
document.querySelectorAll('[data-dir]').forEach(btn => {
  btn.onclick = () => {
    const dir = btn.dataset.dir; const sp = activeSpace();
    let nx = sp.x, nz = sp.z, nw = 4, nd = 4;
    if (dir === 'north') { nz = sp.z + sp.d; nw = sp.w; }
    else if (dir === 'south') { nz = sp.z - nd; nw = sp.w; }
    else if (dir === 'east') { nx = sp.x + sp.w; nd = sp.d; }
    else if (dir === 'west') { nx = sp.x - nw; nd = sp.d; }
    const newSp = { id: nextSpaceId++, name: `공간 ${nextSpaceId - 1}`, x: nx, z: nz, w: nw, d: nd, h: sp.h, floorColor: sp.floorColor, wallColor: sp.wallColor };
    spaces.push(newSp); activeSpaceId = newSp.id;
    buildAllRooms(); syncSpaceUI(); renderSpaceList(); refreshPlacedList(); pushHistory('+ 인접 공간 추가');
  };
});

// ─── 줄자 ───
let rulerMode = false, rulerStart = null, rulerEnd = null, rulerObjs = [];
function clearRuler() { rulerObjs.forEach(o => scene.remove(o)); rulerObjs = []; rulerStart = rulerEnd = null; }
function drawRuler() {
  rulerObjs.forEach(o => scene.remove(o)); rulerObjs = [];
  if (rulerStart) { const d = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), new THREE.MeshBasicMaterial({ color: 0xff2222 })); d.position.copy(rulerStart); scene.add(d); rulerObjs.push(d); }
  if (rulerStart && rulerEnd) {
    const d2 = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), new THREE.MeshBasicMaterial({ color: 0xff2222 })); d2.position.copy(rulerEnd); scene.add(d2); rulerObjs.push(d2);
    const ln = new THREE.Line(new THREE.BufferGeometry().setFromPoints([rulerStart, rulerEnd]), new THREE.LineBasicMaterial({ color: 0xff4444 })); scene.add(ln); rulerObjs.push(ln);
    const dx = rulerEnd.x - rulerStart.x, dz = rulerEnd.z - rulerStart.z;
    const hd = Math.sqrt(dx*dx+dz*dz);
    const mid = rulerStart.clone().add(rulerEnd).multiplyScalar(0.5); mid.y += 0.3;
    const lbl = makeLabelSprite(`${hd.toFixed(2)}m`); lbl.position.copy(mid); scene.add(lbl); rulerObjs.push(lbl);
  }
}
document.getElementById('rulerBtn').onclick = () => { rulerMode = !rulerMode; document.getElementById('rulerBtn').classList.toggle('active', rulerMode); if (!rulerMode) clearRuler(); renderer.domElement.style.cursor = rulerMode ? 'crosshair' : ''; };
document.getElementById('rulerClear').onclick = () => clearRuler();

// ─── 저장/불러오기 ───
const SAVE_VERSION = 2;
function migrateData(data) {
  if (!data.version) data.version = 1;
  if (data.version === 1) {
    data.spaces = [{ id: 1, name: '실험실 1', x: 0, z: 0, ...(data.room || { w: 8, d: 6, h: 3, floorColor: 0x8fbc8f, wallColor: 0xe8dcc8 }) }];
    (data.placed || []).forEach(p => p.spaceId = 1);
    data.version = 2;
  }
  return data;
}

function serializeState() {
  return JSON.stringify({
    version: SAVE_VERSION, spaces, activeSpaceId, nextSpaceId, bgColor: '#' + scene.background.getHexString(),
    placed: placed.map(item => {
      const base = { type: item.type, name: item.name, id: item.id, spaceId: item.spaceId };
      if (item.type === 'equipment') return { ...base, x: item.mesh.position.x, z: item.mesh.position.z, y: item.mesh.position.y, rotY: item.rotY, props: item.props, specName: item.spec?.name, specCategory: item.spec?.category, specSurface: item.spec?.surface, textureDataURL: item.textureDataURL, glbDataURL: item.glbDataURL };
      if (item.type === 'door') return { ...base, props: item.props };
      if (item.type === 'barrier') return { ...base, x: item.mesh.position.x, z: item.mesh.position.z, rotY: item.rotY, props: item.props };
      if (item.type === 'person') return { ...base, x: item.mesh.position.x, z: item.mesh.position.z, rotY: item.rotY, props: item.props };
      if (item.type === 'robot') return { ...base, x: item.mesh.position.x, z: item.mesh.position.z, rotY: item.rotY, props: item.props };
    }), nextId,
  });
}

function loadState(json, skipHistory) {
  const data = migrateData(typeof json === 'string' ? JSON.parse(json) : json);
  [...placed].forEach(p => { scene.remove(p.mesh); if (p.arc) scene.remove(p.arc); });
  placed.length = 0; selectedId = null;
  spaces = data.spaces || [{ id: 1, name: '실험실 1', x: 0, z: 0, w: 8, d: 6, h: 3, floorColor: 0x8fbc8f, wallColor: 0xe8dcc8 }];
  activeSpaceId = data.activeSpaceId || 1;
  nextSpaceId = data.nextSpaceId || (Math.max(...spaces.map(s => s.id)) + 1);
  if (data.bgColor) { scene.background.setStyle(data.bgColor); document.getElementById('bgColor').value = data.bgColor; }
  buildAllRooms(); syncSpaceUI(); renderSpaceList();
  nextId = data.nextId || 1;
  (data.placed || []).forEach(d => {
    const savedActiveId = activeSpaceId;
    activeSpaceId = d.spaceId || 1;
    if (d.type === 'equipment') {
      const libSpec = LIBRARY.find(s => s.name === d.specName) || { name: d.name, w: d.props.w, d: d.props.d, h: d.props.h, color: i2h(d.props.color), opacity: d.props.opacity, showLabel: d.props.showLabel, category: d.specCategory || 'floor', surface: d.specSurface || false, textureDataURL: d.textureDataURL, glbDataURL: d.glbDataURL };
      if (d.textureDataURL && !libSpec.textureDataURL) libSpec.textureDataURL = d.textureDataURL;
      const item = addEquipment(libSpec, d.x, d.z);
      item.id = d.id; item.mesh.userData.id = d.id; item.spaceId = d.spaceId || 1;
      item.rotY = d.rotY || 0; item.mesh.rotation.y = item.rotY;
      item.mesh.position.y = item.usePrimitive ? 0 : (d.y || d.props.h / 2);
      Object.assign(item.props, d.props);
      item.textureDataURL = d.textureDataURL || null;
      item.glbDataURL = d.glbDataURL || null;
      updateEquipVisual(item);
    } else if (d.type === 'door') {
      const item = addDoor(); item.id = d.id; item.mesh.userData.id = d.id; item.spaceId = d.spaceId || 1;
      Object.assign(item.props, d.props); updateDoorPlace(item);
    } else if (d.type === 'barrier') {
      const item = addBarrier(); item.id = d.id; item.mesh.userData.id = d.id; item.spaceId = d.spaceId || 1;
      Object.assign(item.props, d.props); item.rotY = d.rotY || 0; item.mesh.rotation.y = item.rotY;
      item.mesh.position.set(d.x, d.props.h / 2, d.z); updateBarrierVis(item);
    } else if (d.type === 'person') {
      const item = addPerson(); item.id = d.id; item.mesh.userData.id = d.id; item.spaceId = d.spaceId || 1;
      item.mesh.position.set(d.x, 0, d.z); item.rotY = d.rotY || 0; item.mesh.rotation.y = item.rotY;
      Object.assign(item.props, d.props); item.torso.material.color.setHex(d.props.color); item.label.visible = d.props.showLabel;
    } else if (d.type === 'robot') {
      const item = addRobotArm(); item.id = d.id; item.mesh.userData.id = d.id; item.spaceId = d.spaceId || 1;
      item.mesh.position.set(d.x, 0, d.z); item.rotY = d.rotY || 0; item.mesh.rotation.y = item.rotY;
      Object.assign(item.props, d.props); updateRobotVisual(item);
    }
    activeSpaceId = savedActiveId;
  });
  nextId = Math.max(nextId, ...placed.map(p => p.id + 1), 1);
  activeSpaceId = data.activeSpaceId || 1;
  syncSpaceUI(); renderSpaceList(); refreshPlacedList(); refreshEditPanel();
}

document.getElementById('saveBtn').onclick = () => {
  const blob = new Blob([serializeState()], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `lab_layout_v2_${new Date().toISOString().slice(0,10)}.json`; a.click();
};
document.getElementById('loadBtn').onclick = () => document.getElementById('loadFile').click();
document.getElementById('loadFile').onchange = e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader(); r.onload = ev => { try { loadState(ev.target.result); } catch (err) { alert('로드 실패: ' + err.message); console.error(err); } };
  r.readAsText(f); e.target.value = '';
};
function autoSave() { try { localStorage.setItem('labLayout', serializeState()); } catch {} }

// ─── 히스토리 (되돌리기) ───
const history = [];
let historyIdx = -1;
const MAX_HISTORY = 20;

function pushHistory(desc) {
  // 현재 위치 이후 히스토리 버리기
  if (historyIdx < history.length - 1) history.splice(historyIdx + 1);
  history.push({ state: serializeState(), desc, time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) });
  if (history.length > MAX_HISTORY) history.shift();
  historyIdx = history.length - 1;
  renderLog();
  autoSave();
}

function undoTo(idx) {
  if (idx < 0 || idx >= history.length) return;
  historyIdx = idx;
  const skipHistory = true;
  loadState(history[idx].state, skipHistory);
  renderLog();
  autoSave();
}

function renderLog() {
  const el = document.getElementById('logPanel');
  el.innerHTML = history.map((h, i) =>
    `<div class="log-entry${i === historyIdx ? ' current' : ''}" data-idx="${i}">${h.time} ${h.desc}</div>`
  ).join('');
  el.querySelectorAll('.log-entry').forEach(e => {
    e.onclick = () => undoTo(parseInt(e.dataset.idx));
  });
  el.scrollTop = el.scrollHeight;
}

document.getElementById('undoBtn').onclick = () => { if (historyIdx > 0) undoTo(historyIdx - 1); };

document.getElementById('resetBtn').onclick = () => {
  if (!confirm('배치된 모든 객체를 초기화하시겠습니까?')) return;
  [...placed].forEach(p => { scene.remove(p.mesh); if (p.arc) scene.remove(p.arc); });
  placed.length = 0; selectedId = null; nextId = 1;
  refreshPlacedList(); refreshEditPanel();
  pushHistory('🗑 전체 초기화');
};

try { const s = localStorage.getItem('labLayout'); if (s) loadState(s); } catch {}
// 초기 상태 히스토리에 저장
pushHistory('📂 초기 로드');

// ─── 마우스 ───
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let dragging = false, dragOffset = new THREE.Vector3();
const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

function getPointer(e) { const r = renderer.domElement.getBoundingClientRect(); pointer.x = ((e.clientX - r.left) / r.width) * 2 - 1; pointer.y = -((e.clientY - r.top) / r.height) * 2 + 1; }
function pickable() {
  return placed.map(p => {
    if (p.type === 'person' || p.type === 'robot') return p.pickBox;
    if (p.usePrimitive) {
      const pb = p.mesh.children.find(c => c.userData.id === p.id);
      return pb || p.mesh;
    }
    return p.mesh;
  });
}

renderer.domElement.addEventListener('pointerdown', e => {
  if (e.button !== 0) return;
  getPointer(e); raycaster.setFromCamera(pointer, camera);
  if (rulerMode) {
    const surfs = placed.filter(p => p.type === 'equipment' && p.spec?.surface && p.spaceId === activeSpaceId).map(p => p.mesh);
    surfs.push(...floorMeshes);
    const hits = raycaster.intersectObjects(surfs, false);
    if (hits.length > 0) { const hp = hits[0].point.clone(); hp.y += 0.02; if (!rulerStart || (rulerStart && rulerEnd)) { rulerStart = hp; rulerEnd = null; } else { rulerEnd = hp; } drawRuler(); }
    return;
  }
  const hits = raycaster.intersectObjects(pickable(), false);
  if (hits.length > 0) {
    const id = hits[0].object.userData.id; selectItem(id);
    const item = placed.find(p => p.id === id);
    // 공간 자동 전환
    if (item.spaceId !== activeSpaceId) { activeSpaceId = item.spaceId; syncSpaceUI(); renderSpaceList(); refreshPlacedList(); }
    const pt = new THREE.Vector3(); raycaster.ray.intersectPlane(dragPlane, pt);
    const target = (item.type === 'person' || item.type === 'robot') ? item.mesh : item.mesh;
    dragOffset.copy(pt).sub(new THREE.Vector3(target.position.x, 0, target.position.z));
    dragging = true; orbit.enabled = false;
  }
});

renderer.domElement.addEventListener('pointermove', e => {
  if (!dragging || selectedId === null) return;
  getPointer(e); raycaster.setFromCamera(pointer, camera);
  const item = placed.find(p => p.id === selectedId); if (!item) return;
  if (item.type === 'door') { const pt = new THREE.Vector3(); raycaster.ray.intersectPlane(dragPlane, pt); snapDoor(item, pt.x, pt.z); refreshEditPanel(); return; }
  let placedY = null;
  if (item.type === 'equipment' && item.spec?.category === 'tabletop') {
    const surfs = placed.filter(p => p.id !== item.id && p.type === 'equipment' && p.spec?.surface && p.spaceId === item.spaceId).map(p => p.mesh);
    surfs.push(...floorMeshes);
    const hits = raycaster.intersectObjects(surfs, false);
    if (hits.length > 0 && hits[0].face) {
      const n = hits[0].face.normal.clone().transformDirection(hits[0].object.matrixWorld);
      if (n.y > 0.5) { item.mesh.position.x = hits[0].point.x; item.mesh.position.z = hits[0].point.z; placedY = hits[0].point.y + (item.usePrimitive ? 0 : item.props.h / 2); }
    }
  }
  if (placedY === null) {
    const pt = new THREE.Vector3(); raycaster.ray.intersectPlane(dragPlane, pt);
    const target = item.mesh;
    target.position.x = pt.x - dragOffset.x; target.position.z = pt.z - dragOffset.z;
    placedY = (item.type === 'person' || item.type === 'robot' || item.usePrimitive) ? 0 : (item.props?.h || 1) / 2;
  }
  item.mesh.position.y = placedY;
  // 벽 충돌 제약 — 공간 경계 내로 클램프
  const sp = spaces.find(s => s.id === item.spaceId);
  if (sp && item.type !== 'door') {
    const hw = (item.props?.w || 0.3) / 2, hd = (item.props?.d || 0.3) / 2;
    item.mesh.position.x = Math.max(sp.x + hw, Math.min(sp.x + sp.w - hw, item.mesh.position.x));
    item.mesh.position.z = Math.max(sp.z + hd, Math.min(sp.z + sp.d - hd, item.mesh.position.z));
  }
  refreshEditPanel();
});

window.addEventListener('pointerup', () => {
  if (dragging) {
    dragging = false; orbit.enabled = true;
    const item = placed.find(p => p.id === selectedId);
    pushHistory(item ? `↔ ${item.name} 이동` : '↔ 이동');
  }
});

// ─── 키보드 ───
window.addEventListener('keydown', e => {
  const tag = e.target?.tagName || '';
  const inForm = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';
  if (e.key === 'Enter') { if (inForm) e.target.blur(); if (selectedId !== null) selectItem(null); return; }
  if (e.key === 'Escape') { if (rulerMode) { rulerMode = false; document.getElementById('rulerBtn').classList.remove('active'); clearRuler(); renderer.domElement.style.cursor = ''; } if (selectedId !== null) selectItem(null); return; }
  if (inForm) return;
  const item = placed.find(p => p.id === selectedId); if (!item) return;
  if (e.key === 'r' || e.key === 'R') { if (item.type === 'door') return; item.rotY += Math.PI / 2; item.mesh.rotation.y = item.rotY; refreshEditPanel(); pushHistory(`↻ ${item.name} 회전`); }
  else if (e.key === 'Delete' || e.key === 'Backspace') removeItem(item.id);
});

// ─── 스크린샷 ───
function takeScreenshot(filename) {
  renderer.render(scene, camera); // 최신 프레임 렌더
  const a = document.createElement('a');
  a.href = renderer.domElement.toDataURL('image/png');
  a.download = filename || `lab_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.png`;
  a.click();
}

document.getElementById('screenshotBtn').onclick = () => takeScreenshot();

document.getElementById('ssAll').onclick = () => {
  const sp = activeSpace();
  const cx = sp.x + sp.w / 2, cz = sp.z + sp.d / 2, ch = sp.h / 2;
  const dist = Math.max(sp.w, sp.d) * 1.5;
  const views = [
    { name: 'iso', pos: [cx + dist, dist, cz + dist] },
    { name: 'top', pos: [cx, dist * 2, cz + 0.01] },
    { name: 'front', pos: [cx, ch, cz - dist] },
    { name: 'side', pos: [cx + dist, ch, cz] },
  ];
  const origPos = camera.position.clone();
  const origTarget = orbit.target.clone();
  let idx = 0;
  function captureNext() {
    if (idx >= views.length) {
      camera.position.copy(origPos); orbit.target.copy(origTarget); orbit.update();
      return;
    }
    const v = views[idx++];
    camera.position.set(...v.pos);
    orbit.target.set(cx, ch, cz);
    orbit.update(); camera.updateProjectionMatrix();
    requestAnimationFrame(() => { renderer.render(scene, camera); takeScreenshot(`lab_${v.name}.png`); setTimeout(captureNext, 200); });
  }
  captureNext();
};

// ─── 카메라 뷰 프리셋 ───
document.querySelectorAll('[data-view]').forEach(btn => {
  btn.onclick = () => {
    const sp = activeSpace();
    const cx = sp.x + sp.w / 2, cz = sp.z + sp.d / 2, ch = sp.h / 2;
    const dist = Math.max(sp.w, sp.d) * 1.5;
    orbit.target.set(cx, ch, cz);
    switch (btn.dataset.view) {
      case 'iso': camera.position.set(cx + dist, dist, cz + dist); break;
      case 'top': camera.position.set(cx, dist * 2, cz + 0.01); break;
      case 'front': camera.position.set(cx, ch, cz - dist); break;
      case 'side': camera.position.set(cx + dist, ch, cz); break;
    }
    orbit.update();
  };
});

// ─── 충돌 감지 ───
const collisionGroup = new THREE.Group(); scene.add(collisionGroup);
function updateCollisions() {
  collisionGroup.traverse(ch => { if (ch.isMesh) { ch.geometry.dispose(); ch.material.dispose(); } });
  collisionGroup.clear();
  const items = placed.filter(p => ['equipment', 'barrier', 'robot'].includes(p.type) && p.spaceId === activeSpaceId);
  for (let i = 0; i < items.length; i++) {
    for (let j = i + 1; j < items.length; j++) {
      const a = new THREE.Box3().setFromObject(items[i].mesh);
      const b = new THREE.Box3().setFromObject(items[j].mesh);
      if (a.intersectsBox(b)) {
        const inter = a.clone().intersect(b);
        const sz = new THREE.Vector3(); inter.getSize(sz);
        const ct = new THREE.Vector3(); inter.getCenter(ct);
        if (sz.x > 0.01 && sz.y > 0.01 && sz.z > 0.01) {
          const mk = new THREE.Mesh(
            new THREE.BoxGeometry(sz.x, sz.y, sz.z),
            new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.35, side: THREE.DoubleSide, depthTest: false })
          );
          mk.position.copy(ct);
          collisionGroup.add(mk);
        }
      }
    }
  }
}

// ─── 렌더 ───
let collisionTimer = 0;
(function animate() {
  requestAnimationFrame(animate);
  orbit.update();
  // 충돌 체크 (매 30프레임마다)
  if (++collisionTimer >= 30) { collisionTimer = 0; updateCollisions(); }
  renderer.render(scene, camera);
})();
</script>
