<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>실험실 장비 배치 시뮬레이터</title>
<style>
  html, body { margin: 0; height: 100%; font-family: -apple-system, "Apple SD Gothic Neo", sans-serif; background: #1e1e1e; color: #eee; overflow: hidden; }
  #app { display: flex; height: 100vh; }
  #sidebar {
    width: 340px; min-width: 340px; background: #252526; border-right: 1px solid #333;
    overflow-y: auto; padding: 12px; box-sizing: border-box; font-size: 13px;
  }
  #viewport { flex: 1; position: relative; }
  #viewport canvas { display: block; }
  h2 { font-size: 12px; margin: 14px 0 6px; color: #4ec9b0; text-transform: uppercase; letter-spacing: 0.5px; }
  h2:first-child { margin-top: 0; }
  label { display: block; font-size: 11px; color: #aaa; margin-top: 5px; }
  input[type=number], input[type=text], select {
    width: 100%; box-sizing: border-box; background: #1e1e1e; color: #eee;
    border: 1px solid #444; padding: 4px 6px; border-radius: 3px; font-size: 12px;
  }
  input[type=color] { width: 100%; height: 24px; background: #1e1e1e; border: 1px solid #444; border-radius: 3px; cursor: pointer; }
  input[type=range] { width: 100%; }
  .row { display: flex; gap: 6px; }
  .row > * { flex: 1; }
  button {
    background: #0e639c; color: #fff; border: 0; padding: 5px 10px; border-radius: 3px;
    cursor: pointer; font-size: 12px; margin-top: 5px;
  }
  button:hover { background: #1177bb; }
  button.danger { background: #a1260d; }
  button.danger:hover { background: #c42b0e; }
  button.sm { padding: 3px 8px; margin: 0; font-size: 11px; }
  button.ghost { background: #3a3a3d; }
  button.ghost:hover { background: #4a4a4d; }
  button.active { background: #d4a017; color: #000; }

  .palette { display: flex; flex-wrap: wrap; gap: 2px; margin: 3px 0; }
  .swatch { width: 16px; height: 16px; border-radius: 2px; cursor: pointer; border: 1px solid #444; display: inline-block; }
  .swatch:hover { border-color: #fff; transform: scale(1.2); }

  .lib-row {
    background: #2d2d30; padding: 5px 8px; margin: 3px 0; border-radius: 3px;
    display: flex; justify-content: space-between; align-items: center; gap: 6px;
  }
  .lib-row .name { flex: 1; cursor: pointer; font-size: 12px; }
  .lib-row .name:hover { color: #4ec9b0; }
  .lib-row small { color: #888; font-size: 10px; display: block; }
  .lib-edit {
    background: #1f1f22; padding: 8px; margin: 0 0 6px 0; border-radius: 3px;
    border-left: 3px solid #4ec9b0;
  }
  .placed-row {
    background: #2d2d30; padding: 4px 8px; margin: 2px 0; border-radius: 3px;
    cursor: pointer; font-size: 12px; border-left: 3px solid transparent;
    display: flex; justify-content: space-between; align-items: center;
  }
  .placed-row.selected { border-left-color: #4ec9b0; background: #37373d; }
  .badge { font-size: 9px; padding: 1px 5px; border-radius: 8px; }
  .badge.door { background: #cc8844; }
  .badge.barrier { background: #4488cc; }
  .badge.equip { background: #4ec9b0; color: #000; }
  .badge.person { background: #ff9933; color: #000; }
  hr { border: 0; border-top: 1px solid #333; margin: 8px 0; }
  #hint {
    position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.65);
    padding: 6px 10px; border-radius: 4px; font-size: 11px; pointer-events: none; line-height: 1.5;
  }
  .chk { display: flex; align-items: center; gap: 6px; margin: 4px 0; font-size: 12px; color: #ddd; }
  .section-btns { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <!-- 저장/불러오기 -->
    <div class="row" style="margin-bottom:8px">
      <button id="saveBtn" class="ghost" style="flex:1">💾 저장</button>
      <button id="loadBtn" class="ghost" style="flex:1">📂 불러오기</button>
    </div>
    <input type="file" id="loadFile" accept=".json" style="display:none">

    <h2>방 설정 (m)</h2>
    <div class="row">
      <div><label>가로 W</label><input type="number" id="roomW" value="8" step="0.1"></div>
      <div><label>세로 D</label><input type="number" id="roomD" value="6" step="0.1"></div>
      <div><label>높이 H</label><input type="number" id="roomH" value="3" step="0.1"></div>
    </div>
    <div class="row">
      <div><label>바닥 색</label><input type="color" id="floorColor" value="#c8a878"></div>
      <div><label>벽 색</label><input type="color" id="wallColor" value="#aac4e0"></div>
    </div>
    <button id="applyRoom">방 적용</button>

    <h2>도구</h2>
    <div class="section-btns">
      <button id="rulerBtn" class="ghost">📏 줄자</button>
      <button id="rulerClear" class="ghost sm">지우기</button>
    </div>

    <h2>장비 라이브러리</h2>
    <div class="chk"><input type="checkbox" id="showAllLabels" checked> 모든 라벨 표시</div>
    <div id="library"></div>
    <hr>
    <label>커스텀 장비 (이름 / W / D / H)</label>
    <input type="text" id="customName" placeholder="장비명">
    <div class="row">
      <input type="number" id="customW" placeholder="W" step="0.05" value="1">
      <input type="number" id="customD" placeholder="D" step="0.05" value="1">
      <input type="number" id="customH" placeholder="H" step="0.05" value="1">
    </div>
    <button id="addCustom" class="ghost">+ 라이브러리 추가</button>

    <h2>특수 객체</h2>
    <div class="section-btns">
      <button id="addDoor">🚪 문</button>
      <button id="addBarrier">🛡 방호벽</button>
      <button id="addPerson">🧍 사람</button>
    </div>

    <h2>배치된 객체</h2>
    <div id="placedList"></div>

    <h2>편집</h2>
    <div id="editPanel"><small style="color:#666">객체를 선택하세요</small></div>
  </div>
  <div id="viewport">
    <div id="hint">
      좌클릭: 회전 · 우클릭: 팬 · 휠: 줌 · 클릭: 선택 · 드래그: 이동<br>
      Enter: 배치완료 · R: 90°회전 · Del: 삭제 · 줄자: 두 점 클릭→거리
    </div>
  </div>
</div>

<script type="module">

  '#cc8844','#8b6f47','#6b8e23','#3a7ca5','#aa3322','#ff9933','#88ccff','#4ec9b0',

function paletteHTML(inputId) {
  return `<div class="palette">${PALETTE.map(c =>
    `<span class="swatch" style="background:${c}" data-color="${c}" data-for="${inputId}"></span>`
  ).join('')}</div>`;
}

document.addEventListener('click', e => {
  if (!e.target.classList.contains('swatch')) return;
  const input = document.getElementById(e.target.dataset.for);
  if (input) { input.value = e.target.dataset.color; input.dispatchEvent(new Event('input')); }

// ─── 라이브러리 ───
const LIBRARY = [

  { name: '드라이박스/글로브박스', w: 2.0, d: 1.0, h: 1.8, color: '#999988', opacity: 1.0, showLabel: true, category: 'floor', surface: false },
  { name: '드래프트 후드',         w: 1.5, d: 0.8, h: 2.2, color: '#b0b0b0', opacity: 1.0, showLabel: true, category: 'floor', surface: false },

  { name: 'FDM 3D 프린터',         w: 0.5, d: 0.5, h: 0.6, color: '#5588aa', opacity: 1.0, showLabel: true, category: 'tabletop', surface: false },
  { name: '데스크탑 PC + 모니터',  w: 0.6, d: 0.3, h: 0.55, color: '#223344', opacity: 1.0, showLabel: true, category: 'tabletop', surface: false },
  { name: '초음파 세척기',         w: 0.4, d: 0.3, h: 0.35, color: '#778899', opacity: 1.0, showLabel: true, category: 'tabletop', surface: false },
  { name: '연마기',                w: 0.5, d: 0.5, h: 0.4, color: '#666677', opacity: 1.0, showLabel: true, category: 'tabletop', surface: false },
  { name: '저울',                  w: 0.3, d: 0.35, h: 0.15, color: '#cccccc', opacity: 1.0, showLabel: true, category: 'tabletop', surface: false },
  { name: '의자',                  w: 0.5, d: 0.5, h: 0.9, color: '#444466', opacity: 1.0, showLabel: true, category: 'floor', surface: false },
];

// ─── Three.js 셋업 ───
const viewport = document.getElementById('viewport');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x2b2b2b);
const camera = new THREE.PerspectiveCamera(50, 1, 0.01, 1000);
camera.position.set(10, 10, 10);
const renderer = new THREE.WebGLRenderer({ antialias: true });
viewport.appendChild(renderer.domElement);
const orbitCtrl = new OrbitControls(camera, renderer.domElement);
orbitCtrl.target.set(4, 0, 3);
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 20, 10);
scene.add(dirLight);
scene.add(new THREE.AxesHelper(1));

function resize() {
  const w = viewport.clientWidth, h = viewport.clientHeight;
  camera.aspect = w / h; camera.updateProjectionMatrix(); renderer.setSize(w, h);
}
window.addEventListener('resize', resize); resize();

// ─── 방 ───
let roomGroup = new THREE.Group();
scene.add(roomGroup);
let floorMesh = null;
let room = { w: 8, d: 6, h: 3, floorColor: 0xc8a878, wallColor: 0xaac4e0 };

function buildRoom() {
  roomGroup.clear();
  const { w, d, h, floorColor, wallColor } = room;
  floorMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(w, d),
    new THREE.MeshStandardMaterial({ color: floorColor, side: THREE.DoubleSide })
  );
  floorMesh.rotation.x = -Math.PI / 2;
  floorMesh.position.set(w/2, 0, d/2);
  floorMesh.userData.isFloor = true;
  roomGroup.add(floorMesh);
  const grid = new THREE.GridHelper(Math.max(w, d) * 2, Math.max(w, d) * 2, 0x555555, 0x666666);
  grid.position.set(w/2, 0.002, d/2);
  grid.material.opacity = 0.35; grid.material.transparent = true;
  roomGroup.add(grid);
  const wm = new THREE.MeshStandardMaterial({ color: wallColor, transparent: true, opacity: 0.45, side: THREE.DoubleSide });
  const addWall = (ww, hh, x, y, z, ry) => { const m = new THREE.Mesh(new THREE.PlaneGeometry(ww, hh), wm); m.position.set(x,y,z); m.rotation.y = ry; roomGroup.add(m); };
  addWall(w, h, w/2, h/2, 0, 0);
  addWall(w, h, w/2, h/2, d, Math.PI);
  addWall(d, h, 0, h/2, d/2, Math.PI/2);
  addWall(d, h, w, h/2, d/2, -Math.PI/2);
}
buildRoom();

// ─── 상태 ───
const placed = [];
let selectedId = null;
let editingLibIdx = null;
let nextId = 1;

// ─── 라벨 스프라이트 ───
function makeLabelSprite(text) {
  const c = document.createElement('canvas');
  const pad = 14, fs = 44;
  const ctx = c.getContext('2d');
  ctx.font = `bold ${fs}px -apple-system, "Apple SD Gothic Neo", sans-serif`;
  c.width = ctx.measureText(text).width + pad * 2;
  c.height = fs + pad * 2;
  const ctx2 = c.getContext('2d');
  ctx2.font = `bold ${fs}px -apple-system, "Apple SD Gothic Neo", sans-serif`;
  ctx2.fillStyle = 'rgba(0,0,0,0.7)';
  ctx2.fillRect(0, 0, c.width, c.height);
  ctx2.fillStyle = '#fff';
  ctx2.textBaseline = 'middle';
  ctx2.fillText(text, pad, c.height / 2);
  const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), depthTest: false, transparent: true }));
  s.scale.set(c.width * 0.004, c.height * 0.004, 1);
  return s;
}

function c2i(c) { return typeof c === 'number' ? c : parseInt(String(c).replace('#',''), 16); }
function i2h(i) { return '#' + i.toString(16).padStart(6, '0'); }

// ─── 장비 추가 ───
function addEquipment(spec, x = null, z = null) {
  const id = nextId++;
  const p = { w: spec.w, d: spec.d, h: spec.h, color: c2i(spec.color), opacity: spec.opacity ?? 1, showLabel: spec.showLabel ?? true };
  const geo = new THREE.BoxGeometry(p.w, p.h, p.d);
  const mat = new THREE.MeshStandardMaterial({ color: p.color, transparent: p.opacity < 1, opacity: p.opacity });
  const mesh = new THREE.Mesh(geo, mat);
  const edges = new THREE.LineSegments(new THREE.EdgesGeometry(geo), new THREE.LineBasicMaterial({ color: 0x000000 }));
  mesh.add(edges);
  const label = makeLabelSprite(spec.name);
  label.position.set(0, p.h / 2 + 0.25, 0);
  label.visible = p.showLabel;
  mesh.add(label);
  if (x === null) x = room.w / 2;
  if (z === null) z = room.d / 2;
  mesh.position.set(x, p.h / 2, z);
  mesh.userData.id = id;
  scene.add(mesh);
  const item = { id, type: 'equipment', name: spec.name, spec: { ...spec }, mesh, label, edges, rotY: 0, props: p };
  placed.push(item);
  refreshPlacedList(); selectItem(id);
  autoSave();
  return item;
}

function updateEquipVisual(item) {
  const p = item.props;
  item.mesh.geometry.dispose();
  item.mesh.geometry = new THREE.BoxGeometry(p.w, p.h, p.d);
  item.mesh.remove(item.edges);
  item.edges = new THREE.LineSegments(new THREE.EdgesGeometry(item.mesh.geometry), new THREE.LineBasicMaterial({ color: 0x000000 }));
  item.mesh.add(item.edges);
  item.mesh.material.color.setHex(p.color);
  item.mesh.material.opacity = p.opacity;
  item.mesh.material.transparent = p.opacity < 1;
  if (item.mesh.position.y < p.h / 2) item.mesh.position.y = p.h / 2;
  item.label.position.y = p.h / 2 + 0.25;
  item.label.visible = p.showLabel;
}

// ─── 문 ───
function getWallVecs(wall) {
  switch (wall) {
    case 'south': return { right: [1,0], into: [0,1] };
    case 'north': return { right: [-1,0], into: [0,-1] };
    case 'west':  return { right: [0,-1], into: [1,0] };
    case 'east':  return { right: [0,1], into: [-1,0] };
  }
}
function getDoorCenter(wall, pos) {
  switch (wall) {
    case 'south': return [pos, 0];
    case 'north': return [pos, room.d];
    case 'west':  return [0, pos];
    case 'east':  return [room.w, pos];
  }
}

function buildDoorArcMesh(p) {
  const { right, into } = getWallVecs(p.wall);
  const ctr = getDoorCenter(p.wall, p.pos);
  const hw = p.width / 2;
  const hsign = p.hinge === 'left' ? -1 : 1;
  const hx = ctr[0] + hsign * hw * right[0];
  const hz = ctr[1] + hsign * hw * right[1];
  const closedDir = p.hinge === 'left' ? [right[0], right[1]] : [-right[0], -right[1]];
  const swSign = p.swing === 'in' ? 1 : -1;
  const openDir = [swSign * into[0], swSign * into[1]];
  const startA = Math.atan2(closedDir[1], closedDir[0]);
  const endA = Math.atan2(openDir[1], openDir[0]);
  let diff = endA - startA;
  if (diff > Math.PI) diff -= 2 * Math.PI;
  if (diff < -Math.PI) diff += 2 * Math.PI;
  const pts = [new THREE.Vector3(hx, 0.015, hz)];
  const segs = 20;
  for (let i = 0; i <= segs; i++) {
    const a = startA + diff * (i / segs);
    pts.push(new THREE.Vector3(hx + p.width * Math.cos(a), 0.015, hz + p.width * Math.sin(a)));
  }
  pts.push(new THREE.Vector3(hx, 0.015, hz));
  // fill arc area
  const fillPts2D = [];
  for (let i = 0; i <= segs; i++) {
    const a = startA + diff * (i / segs);
    fillPts2D.push(new THREE.Vector2(p.width * Math.cos(a), p.width * Math.sin(a)));
  }
  fillPts2D.push(new THREE.Vector2(0, 0));
  const shape = new THREE.Shape(fillPts2D);
  const fillGeo = new THREE.ShapeGeometry(shape);
  const fillMesh = new THREE.Mesh(fillGeo, new THREE.MeshBasicMaterial({ color: 0xffcc00, transparent: true, opacity: 0.15, side: THREE.DoubleSide }));
  fillMesh.rotation.x = -Math.PI / 2;
  fillMesh.position.set(hx, 0.01, hz);
  const arcLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), new THREE.LineBasicMaterial({ color: 0xffcc00 }));
  const g = new THREE.Group();
  g.add(arcLine);
  g.add(fillMesh);
  return g;
}

function addDoor() {
  const id = nextId++;
  const p = { width: 0.9, height: 2.1, color: 0xcc8844, wall: 'south', pos: 1.5, hinge: 'left', swing: 'in' };
  const panel = new THREE.Mesh(
    new THREE.BoxGeometry(p.width, p.height, 0.06),
    new THREE.MeshStandardMaterial({ color: p.color })
  );
  panel.userData.id = id;
  scene.add(panel);
  const arc = buildDoorArcMesh(p);
  scene.add(arc);
  const label = makeLabelSprite('문');
  label.visible = true;
  panel.add(label);
  const item = { id, type: 'door', name: '문', mesh: panel, arc, label, props: p };
  placed.push(item);
  updateDoorPlacement(item);
  refreshPlacedList(); selectItem(id);
  autoSave();
  return item;
}

function updateDoorPlacement(item) {
  const p = item.props;
  const hw = p.width / 2;
  if (p.wall === 'south' || p.wall === 'north') p.pos = Math.max(hw, Math.min(room.w - hw, p.pos));
  else p.pos = Math.max(hw, Math.min(room.d - hw, p.pos));
  item.mesh.geometry.dispose();
  item.mesh.geometry = new THREE.BoxGeometry(p.width, p.height, 0.06);
  item.mesh.material.color.setHex(p.color);
  const ctr = getDoorCenter(p.wall, p.pos);
  const off = 0.04;
  let px, pz, ry;
  switch (p.wall) {
    case 'south': px = ctr[0]; pz = off;          ry = 0; break;
    case 'north': px = ctr[0]; pz = room.d - off; ry = Math.PI; break;
    case 'west':  px = off;          pz = ctr[1]; ry = -Math.PI / 2; break;
    case 'east':  px = room.w - off; pz = ctr[1]; ry = Math.PI / 2; break;
  }
  item.mesh.position.set(px, p.height / 2, pz);
  item.mesh.rotation.y = ry;
  item.label.position.set(0, p.height / 2 + 0.2, 0);
  // rebuild arc
  scene.remove(item.arc);
  item.arc = buildDoorArcMesh(p);
  scene.add(item.arc);
}

function snapDoorToWall(item, hx, hz) {
  const { w, d } = room;
  const cands = [
    { wall: 'south', dist: Math.abs(hz), pos: hx },
    { wall: 'north', dist: Math.abs(d - hz), pos: hx },
    { wall: 'west', dist: Math.abs(hx), pos: hz },
    { wall: 'east', dist: Math.abs(w - hx), pos: hz },
  ];
  cands.sort((a, b) => a.dist - b.dist);
  item.props.wall = cands[0].wall;
  item.props.pos = cands[0].pos;
  updateDoorPlacement(item);
}

// ─── 방호벽 ───
function addBarrier() {
  const id = nextId++;
  const p = { w: 2.0, d: 0.05, h: 1.8, color: 0x88ccff, opacity: 0.3, showLabel: false };
  const geo = new THREE.BoxGeometry(p.w, p.h, p.d);
  const mat = new THREE.MeshStandardMaterial({ color: p.color, transparent: true, opacity: p.opacity, side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(geo, mat);
  const edges = new THREE.LineSegments(new THREE.EdgesGeometry(geo), new THREE.LineBasicMaterial({ color: 0x4488cc }));
  mesh.add(edges);
  const label = makeLabelSprite('방호벽');
  label.position.set(0, p.h / 2 + 0.2, 0);
  label.visible = p.showLabel;
  mesh.add(label);
  mesh.position.set(room.w / 2, p.h / 2, room.d / 2);
  mesh.userData.id = id;
  scene.add(mesh);
  const item = { id, type: 'barrier', name: '방호벽', mesh, label, edges, rotY: 0, props: p };
  placed.push(item);
  refreshPlacedList(); selectItem(id);
  autoSave();
  return item;
}

function updateBarrierVisual(item) {
  const p = item.props;
  item.mesh.geometry.dispose();
  item.mesh.geometry = new THREE.BoxGeometry(p.w, p.h, p.d);
  item.mesh.remove(item.edges);
  item.edges = new THREE.LineSegments(new THREE.EdgesGeometry(item.mesh.geometry), new THREE.LineBasicMaterial({ color: 0x4488cc }));
  item.mesh.add(item.edges);
  item.mesh.material.color.setHex(p.color);
  item.mesh.material.opacity = p.opacity;
  item.mesh.position.y = p.h / 2;
  item.label.position.y = p.h / 2 + 0.2;
  item.label.visible = p.showLabel;
}

// ─── 삭제/선택 ───
function removeItem(id) {
  const idx = placed.findIndex(p => p.id === id);
  if (idx < 0) return;
  const item = placed[idx];
  scene.remove(item.mesh);
  if (item.arc) scene.remove(item.arc);
  placed.splice(idx, 1);
  if (selectedId === id) selectedId = null;
  refreshPlacedList(); refreshEditPanel();
  autoSave();
}

function selectItem(id) {
  selectedId = id; editingLibIdx = null;
  placed.forEach(p => {
    let mat;
    if (p.type === 'person') mat = p.torso?.material;
    else if (p.type === 'door') mat = p.mesh.material;
    else mat = p.mesh.material;
    if (mat && mat.emissive) {
      mat.emissive.setHex(p.id === id ? 0x4ec9b0 : 0x000000);
      mat.emissiveIntensity = p.id === id ? 0.4 : 0;
    }
  });
  refreshPlacedList(); refreshEditPanel();
}

// ─── 줄자 ───
let rulerMode = false;
let rulerStart = null, rulerEnd = null;
let rulerObjs = [];

function clearRuler() {
  rulerObjs.forEach(o => scene.remove(o));
  rulerObjs = [];
  rulerStart = rulerEnd = null;
}
function drawRuler() {
  rulerObjs.forEach(o => scene.remove(o));
  rulerObjs = [];
  if (rulerStart) {
    const dot = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), new THREE.MeshBasicMaterial({ color: 0xff2222 }));
    dot.position.copy(rulerStart);
    scene.add(dot); rulerObjs.push(dot);
  }
  if (rulerStart && rulerEnd) {
    const dot2 = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), new THREE.MeshBasicMaterial({ color: 0xff2222 }));
    dot2.position.copy(rulerEnd);
    scene.add(dot2); rulerObjs.push(dot2);
    // 대시선 (점선은 어렵지만 실선으로)
    const line = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([rulerStart, rulerEnd]),
      new THREE.LineBasicMaterial({ color: 0xff4444 })
    );
    scene.add(line); rulerObjs.push(line);
    // 수직 보조선 (높이 차이)
    const dx = rulerEnd.x - rulerStart.x;
    const dz = rulerEnd.z - rulerStart.z;
    const horizDist = Math.sqrt(dx * dx + dz * dz);
    const dist3d = rulerStart.distanceTo(rulerEnd);
    const mid = rulerStart.clone().add(rulerEnd).multiplyScalar(0.5);
    mid.y += 0.3;
    const lbl = makeLabelSprite(`${horizDist.toFixed(2)}m` + (Math.abs(rulerStart.y - rulerEnd.y) > 0.01 ? ` (3D: ${dist3d.toFixed(2)}m)` : ''));
    lbl.position.copy(mid);
    scene.add(lbl); rulerObjs.push(lbl);
  }
}

document.getElementById('rulerBtn').onclick = () => {
  rulerMode = !rulerMode;
  document.getElementById('rulerBtn').classList.toggle('active', rulerMode);
  if (!rulerMode) { clearRuler(); }
  renderer.domElement.style.cursor = rulerMode ? 'crosshair' : '';
};
document.getElementById('rulerClear').onclick = () => { clearRuler(); };

// ─── 저장/불러오기 ───
function serializeState() {
  return JSON.stringify({
    version: 2,
    room,
    placed: placed.map(item => {
      const base = { type: item.type, name: item.name, id: item.id };
      if (item.type === 'equipment') {
        return { ...base, x: item.mesh.position.x, z: item.mesh.position.z, y: item.mesh.position.y, rotY: item.rotY, props: item.props, specName: item.spec.name, specCategory: item.spec.category, specSurface: item.spec.surface };
      } else if (item.type === 'door') {
        return { ...base, props: item.props };
      } else if (item.type === 'barrier') {
        return { ...base, x: item.mesh.position.x, z: item.mesh.position.z, rotY: item.rotY, props: item.props };
      } else if (item.type === 'person') {
        return { ...base, x: item.mesh.position.x, z: item.mesh.position.z, rotY: item.rotY, props: item.props };
      }
    }),
    nextId,
  });
}

function loadState(json) {
  const data = JSON.parse(json);
  // clear
  [...placed].forEach(p => { scene.remove(p.mesh); if (p.arc) scene.remove(p.arc); });
  placed.length = 0;
  selectedId = null;
  // room
  Object.assign(room, data.room);
  document.getElementById('roomW').value = room.w;
  document.getElementById('roomD').value = room.d;
  document.getElementById('roomH').value = room.h;
  document.getElementById('floorColor').value = i2h(room.floorColor);
  document.getElementById('wallColor').value = i2h(room.wallColor);
  buildRoom();
  orbitCtrl.target.set(room.w / 2, 0, room.d / 2);
  // items
  nextId = data.nextId || 1;
  (data.placed || []).forEach(d => {
    if (d.type === 'equipment') {
      const libSpec = LIBRARY.find(s => s.name === d.specName) || { name: d.name, w: d.props.w, d: d.props.d, h: d.props.h, color: i2h(d.props.color), opacity: d.props.opacity, showLabel: d.props.showLabel, category: d.specCategory || 'floor', surface: d.specSurface || false };
      const item = addEquipment(libSpec, d.x, d.z);
      item.id = d.id; item.mesh.userData.id = d.id;
      item.rotY = d.rotY || 0; item.mesh.rotation.y = item.rotY;
      item.mesh.position.y = d.y || d.props.h / 2;
      Object.assign(item.props, d.props);
      updateEquipVisual(item);
    } else if (d.type === 'door') {
      const item = addDoor();
      item.id = d.id; item.mesh.userData.id = d.id;
      Object.assign(item.props, d.props);
      updateDoorPlacement(item);
    } else if (d.type === 'barrier') {
      const item = addBarrier();
      item.id = d.id; item.mesh.userData.id = d.id;
      Object.assign(item.props, d.props);
      item.rotY = d.rotY || 0; item.mesh.rotation.y = item.rotY;
      item.mesh.position.set(d.x, d.props.h / 2, d.z);
      updateBarrierVisual(item);
    } else if (d.type === 'person') {
      const item = addPerson();
      item.id = d.id; item.mesh.userData.id = d.id;
      item.mesh.position.set(d.x, 0, d.z);
      item.rotY = d.rotY || 0; item.mesh.rotation.y = item.rotY;
      Object.assign(item.props, d.props);
      item.torso.material.color.setHex(d.props.color);
      item.label.visible = d.props.showLabel;
    }
  });
  nextId = Math.max(nextId, ...placed.map(p => p.id + 1));
  refreshPlacedList(); refreshEditPanel();
}

document.getElementById('saveBtn').onclick = () => {
  const blob = new Blob([serializeState()], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `lab_layout_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
};
document.getElementById('loadBtn').onclick = () => document.getElementById('loadFile').click();
document.getElementById('loadFile').onchange = e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => { try { loadState(ev.target.result); } catch (err) { alert('파일 로드 실패: ' + err.message); } };
  r.readAsText(f);
  e.target.value = '';
};

function autoSave() {
  try { localStorage.setItem('labLayout', serializeState()); } catch {}
}
// 자동 복원
try {
  const saved = localStorage.getItem('labLayout');
  if (saved) loadState(saved);
} catch {}

// ─── 마우스 ───
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let dragging = false, dragOffset = new THREE.Vector3();
const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

function getPointer(e) {
  const r = renderer.domElement.getBoundingClientRect();
  pointer.x = ((e.clientX - r.left) / r.width) * 2 - 1;
  pointer.y = -((e.clientY - r.top) / r.height) * 2 + 1;
}
function pickable() {
  return placed.map(p => p.type === 'person' ? p.pickBox : p.mesh);
}

renderer.domElement.addEventListener('pointerdown', e => {
  if (e.button !== 0) return;
  getPointer(e);
  raycaster.setFromCamera(pointer, camera);

  if (rulerMode) {
    const pt = new THREE.Vector3();
    // raycast against floor + surfaces
    const surfs = placed.filter(p => p.type === 'equipment' && p.spec?.surface).map(p => p.mesh);
    surfs.push(floorMesh);
    const hits = raycaster.intersectObjects(surfs, false);
    if (hits.length > 0) {
      const hp = hits[0].point.clone();
      hp.y += 0.02;
      if (!rulerStart || (rulerStart && rulerEnd)) {
        rulerStart = hp; rulerEnd = null;
      } else {
        rulerEnd = hp;
      }
      drawRuler();
    }
    return;
  }

  const hits = raycaster.intersectObjects(pickable(), false);
  if (hits.length > 0) {
    const id = hits[0].object.userData.id;
    selectItem(id);
    const item = placed.find(p => p.id === id);
    const point = new THREE.Vector3();
    raycaster.ray.intersectPlane(dragPlane, point);
    if (item.type === 'equipment' || item.type === 'barrier') {
      dragOffset.copy(point).sub(new THREE.Vector3(item.mesh.position.x, 0, item.mesh.position.z));
    } else if (item.type === 'person') {
      dragOffset.copy(point).sub(new THREE.Vector3(item.mesh.position.x, 0, item.mesh.position.z));
    } else {
      dragOffset.set(0, 0, 0);
    }
    dragging = true;
    orbitCtrl.enabled = false;
  }
});

renderer.domElement.addEventListener('pointermove', e => {
  if (!dragging || selectedId === null) return;
  getPointer(e);
  raycaster.setFromCamera(pointer, camera);
  const item = placed.find(p => p.id === selectedId);
  if (!item) return;

  if (item.type === 'door') {
    const pt = new THREE.Vector3();
    raycaster.ray.intersectPlane(dragPlane, pt);
    snapDoorToWall(item, pt.x, pt.z);
    refreshEditPanel(); return;
  }

  // 테이블탑 스냅
  let placedY = null;
  if (item.type === 'equipment' && item.spec?.category === 'tabletop') {
    const surfs = placed.filter(p => p.id !== item.id && p.type === 'equipment' && p.spec?.surface).map(p => p.mesh);
    surfs.push(floorMesh);
    const hits = raycaster.intersectObjects(surfs, false);
    if (hits.length > 0 && hits[0].face) {
      const n = hits[0].face.normal.clone().transformDirection(hits[0].object.matrixWorld);
      if (n.y > 0.5) {
        item.mesh.position.x = hits[0].point.x;
        item.mesh.position.z = hits[0].point.z;
        placedY = hits[0].point.y + item.props.h / 2;
      }
    }
  }
  if (placedY === null) {
    const pt = new THREE.Vector3();
    raycaster.ray.intersectPlane(dragPlane, pt);
    const target = item.type === 'equipment' || item.type === 'barrier' ? item.mesh : item.mesh;
    let nx = pt.x - dragOffset.x, nz = pt.z - dragOffset.z;
    nx = Math.max(0.1, Math.min(room.w - 0.1, nx));
    nz = Math.max(0.1, Math.min(room.d - 0.1, nz));
    target.position.x = nx; target.position.z = nz;
    placedY = item.type === 'person' ? 0 : (item.props?.h || 1) / 2;
  }
  (item.type === 'person' ? item.mesh : item.mesh).position.y = placedY;
  refreshEditPanel();
});

window.addEventListener('pointerup', () => {
  if (dragging) { dragging = false; orbitCtrl.enabled = true; autoSave(); }
});

// ─── 키보드 ───
window.addEventListener('keydown', e => {
  const tag = e.target?.tagName || '';
  const inForm = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';
  if (e.key === 'Enter') {
    if (inForm) e.target.blur();
    if (selectedId !== null) selectItem(null);
    return;
  }
  if (e.key === 'Escape') { if (rulerMode) { rulerMode = false; document.getElementById('rulerBtn').classList.remove('active'); clearRuler(); renderer.domElement.style.cursor = ''; } if (selectedId !== null) selectItem(null); return; }
  if (inForm) return;
  const item = placed.find(p => p.id === selectedId);
  if (!item) return;
  if (e.key === 'r' || e.key === 'R') {
    if (item.type === 'door') return;
    item.rotY += Math.PI / 2;
    item.mesh.rotation.y = item.rotY;
    refreshEditPanel(); autoSave();
  } else if (e.key === 'Delete' || e.key === 'Backspace') {
    removeItem(item.id);
  }
});

// ─── 렌더 루프 ───
(function animate() { requestAnimationFrame(animate); orbitCtrl.update(); renderer.render(scene, camera); })();
</script>
</body>
